<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Dashboard · Petit Spa</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { display: flex; }

    .header-wrap {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .saludo { font-size: 13px; color: var(--texto-2); margin-bottom: 4px; }

    /* Cards doradas de resumen */
    .resumen-wrap {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .card-stat-dorada {
      background: linear-gradient(135deg, #1A1814 0%, #2d2820 100%);
      border-radius: var(--radio-lg);
      padding: 22px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .card-stat-dorada::after {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 130px; height: 130px;
      background: radial-gradient(circle, rgba(201,168,76,0.2) 0%, transparent 70%);
      border-radius: 50%;
    }
    .card-stat {
      background: var(--blanco);
      border-radius: var(--radio-lg);
      padding: 20px;
    }
    .stat-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      opacity: 0.5; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-label svg { width: 14px; height: 14px; }
    .card-stat-dorada .stat-label { color: rgba(255,255,255,0.6); }
    .card-stat .stat-label { color: var(--texto-2); }
    .stat-numero {
      font-family: var(--serif);
      font-size: 52px; font-weight: 700;
      line-height: 1; margin-bottom: 4px;
    }
    .card-stat-dorada .stat-numero { color: var(--dorado); }
    .card-stat .stat-numero { color: var(--texto); }
    .stat-sub { font-size: 12px; opacity: 0.45; }
    .card-stat-dorada .stat-sub { color: white; }
    .card-stat .stat-sub { color: var(--texto-2); }

    /* Sección citas */
    .seccion-wrap {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 16px;
      align-items: start;
    }
    .seccion-titulo-wrap {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .seccion-titulo {
      font-family: var(--serif);
      font-size: 20px; font-weight: 600;
    }
    .seccion-titulo span { color: var(--dorado); font-style: italic; }

    /* Item de cita */
    .cita-row {
      background: var(--blanco);
      border-radius: var(--radio-lg);
      padding: 16px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cita-row:hover { transform: translateX(4px); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .cita-hora-pill {
      background: var(--dorado-bg);
      border-radius: 10px;
      padding: 8px 12px;
      text-align: center;
      flex-shrink: 0;
      min-width: 56px;
    }
    .cita-hora-num {
      font-family: var(--serif);
      font-size: 18px; font-weight: 700;
      color: var(--dorado); line-height: 1;
    }
    .cita-hora-suf { font-size: 9px; font-weight: 600; color: var(--dorado); letter-spacing: 0.05em; opacity: 0.7; }
    .cita-info { flex: 1; min-width: 0; }
    .cita-nombre { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cita-det { font-size: 12px; color: var(--texto-2); }
    .cita-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
    .btn-conf {
      background: rgba(46,125,50,0.1); color: var(--exito);
      border: none; border-radius: 999px;
      font-family: var(--sans); font-size: 11px; font-weight: 600;
      padding: 6px 12px; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .btn-conf:hover { background: rgba(46,125,50,0.18); }
    .btn-conf svg { width: 11px; height: 11px; }
    .btn-canc {
      background: transparent; color: var(--error);
      border: 1px solid rgba(229,57,53,0.2);
      border-radius: 999px; font-family: var(--sans);
      font-size: 11px; font-weight: 600;
      padding: 6px 12px; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .btn-canc:hover { background: rgba(229,57,53,0.05); }
    .btn-canc svg { width: 11px; height: 11px; }

    /* Panel proximas */
    .proximas-card {
      background: var(--blanco);
      border-radius: var(--radio-lg);
      overflow: hidden;
    }
    .proximas-head {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--borde);
    }
    .proximas-head-titulo { font-family: var(--serif); font-size: 17px; font-weight: 600; }
    .proximas-head-titulo span { color: var(--dorado); font-style: italic; }
    .proxima-fila {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--borde);
      transition: background 0.15s;
    }
    .proxima-fila:last-child { border-bottom: none; }
    .proxima-fila:hover { background: var(--fondo); }
    .proxima-dia {
      font-family: var(--serif); font-size: 24px; font-weight: 700;
      color: var(--dorado); min-width: 34px; text-align: center; line-height: 1;
    }
    .proxima-det { flex: 1; min-width: 0; }
    .proxima-nombre { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proxima-info { font-size: 11px; color: var(--texto-2); margin-top: 1px; }

    @media (max-width: 680px) {
      body { display: block; }
      .resumen-wrap { grid-template-columns: 1fr 1fr; }
      .seccion-wrap { grid-template-columns: 1fr; }
      .proximas-card { display: none; }
      .cita-actions { flex-direction: row; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="https://raw.githubusercontent.com/petitspaapp/petit-spa/main/petitspa-logo.png" alt="Petit Spa" />
    </div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html" class="activo" data-tooltip="Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a></li>
      <li><a href="calendario.html" data-tooltip="Calendario"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></a></li>
      <li><a href="servicios.html" data-tooltip="Servicios"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg></a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="activo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </a>
    <a href="calendario.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Citas
    </a>
    <a href="servicios.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      Servicios
    </a>
  </nav>

  <div class="main-wrap">
    <div class="main">

      <div class="header-wrap">
        <div>
          <div class="saludo" id="saludo">Buen día</div>
          <div class="titulo-pagina" id="fecha-titulo">—</div>
        </div>
      </div>

      <div class="resumen-wrap">
        <div class="card-stat-dorada">
          <div class="stat-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            Citas hoy
          </div>
          <div class="stat-numero" id="total-hoy">—</div>
          <div class="stat-sub">programadas para hoy</div>
        </div>
        <div class="card-stat">
          <div class="stat-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2 2"/></svg>
            Pendientes
          </div>
          <div class="stat-numero" id="total-pendientes">—</div>
          <div class="stat-sub">por confirmar</div>
        </div>
        <div class="card-stat">
          <div class="stat-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Confirmadas
          </div>
          <div class="stat-numero" id="total-conf">—</div>
          <div class="stat-sub">listas</div>
        </div>
      </div>

      <div class="seccion-wrap">
        <div>
          <div class="seccion-titulo-wrap">
            <div class="seccion-titulo">Agenda de <span>hoy</span></div>
          </div>
          <div id="citas-lista">
            <div class="empty-state">
              <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
              <h3>Sin citas hoy</h3>
              <p>No hay citas programadas para hoy</p>
            </div>
          </div>
        </div>

        <div class="proximas-card">
          <div class="proximas-head">
            <div class="proximas-head-titulo">Próximas <span>citas</span></div>
          </div>
          <div id="proximas-lista">
            <div style="padding:24px 16px;text-align:center;font-size:12px;color:var(--texto-2)">Sin próximas citas</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase, toast } from '../supabase.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) window.location.href = 'login.html';

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });

    const hoy = new Date();
    const hoyStr = hoy.toISOString().split('T')[0];
    const hora = hoy.getHours();
    const DIAS  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    document.getElementById('saludo').textContent = hora < 12 ? 'Buenos días ✦' : hora < 18 ? 'Buenas tardes ✦' : 'Buenas noches ✦';
    document.getElementById('fecha-titulo').innerHTML = `${DIAS[hoy.getDay()].charAt(0).toUpperCase() + DIAS[hoy.getDay()].slice(1)}, <span>${hoy.getDate()} de ${MESES[hoy.getMonth()]}</span>`;

    const { data: servicios } = await supabase.from('servicios').select('id, nombre');
    const mapaServ = {};
    (servicios || []).forEach(s => mapaServ[s.id] = s.nombre);

    async function cargarCitas() {
      const { data } = await supabase.from('citas').select('*').eq('fecha', hoyStr).order('hora', { ascending: true });
      const citas = data || [];
      document.getElementById('total-hoy').textContent        = citas.length;
      document.getElementById('total-pendientes').textContent  = citas.filter(c => c.estado === 'pendiente').length;
      document.getElementById('total-conf').textContent        = citas.filter(c => c.estado === 'confirmada').length;

      const lista = document.getElementById('citas-lista');
      if (!citas.length) {
        lista.innerHTML = `<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div><h3>Sin citas hoy</h3><p>No hay citas programadas para hoy</p></div>`;
        return;
      }
      lista.innerHTML = citas.map(c => `
        <div class="cita-row">
          <div class="cita-hora-pill">
            <div class="cita-hora-num">${(c.hora||'').substring(0,5)}</div>
            <div class="cita-hora-suf">HRS</div>
          </div>
          <div class="cita-info">
            <div class="cita-nombre">${c.cliente_nombre||'—'}</div>
            <div class="cita-det">${mapaServ[c.servicio_id]||'—'} · ${c.cliente_telefono||'—'}</div>
          </div>
          <div class="cita-actions">
            <span class="badge badge-${c.estado}">${c.estado}</span>
            ${c.estado === 'pendiente' ? `<button class="btn-conf" data-id="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Confirmar</button>` : ''}
            ${c.estado !== 'cancelada' ? `<button class="btn-canc" data-id="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>Cancelar</button>` : ''}
          </div>
        </div>`).join('');

      lista.querySelectorAll('.btn-conf').forEach(btn => {
        btn.addEventListener('click', async () => {
          await supabase.from('citas').update({ estado: 'confirmada' }).eq('id', btn.dataset.id);
          toast('Cita confirmada ✓'); cargarCitas();
        });
      });
      lista.querySelectorAll('.btn-canc').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('¿Cancelar esta cita?')) return;
          await supabase.from('citas').update({ estado: 'cancelada' }).eq('id', btn.dataset.id);
          toast('Cita cancelada'); cargarCitas();
        });
      });
    }

    async function cargarProximas() {
      const en7 = new Date(hoy); en7.setDate(en7.getDate() + 7);
      const { data } = await supabase.from('citas').select('*')
        .gt('fecha', hoyStr).lte('fecha', en7.toISOString().split('T')[0])
        .in('estado', ['pendiente','confirmada']).order('fecha').order('hora').limit(6);
      const contenedor = document.getElementById('proximas-lista');
      if (!data?.length) { contenedor.innerHTML = `<div style="padding:24px 16px;text-align:center;font-size:12px;color:var(--texto-2)">Sin próximas citas</div>`; return; }
      contenedor.innerHTML = data.map(c => {
        const f = new Date(c.fecha + 'T12:00:00');
        return `<div class="proxima-fila">
          <div class="proxima-dia">${f.getDate()}</div>
          <div class="proxima-det">
            <div class="proxima-nombre">${c.cliente_nombre||'—'}</div>
            <div class="proxima-info">${MESES[f.getMonth()].substring(0,3)} · ${(c.hora||'').substring(0,5)} · ${mapaServ[c.servicio_id]||'—'}</div>
          </div>
          <span class="badge badge-${c.estado}">${c.estado === 'confirmada' ? 'conf.' : 'pend.'}</span>
        </div>`;
      }).join('');
    }

    cargarCitas(); cargarProximas();

    supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'citas' }, () => {
      cargarCitas(); cargarProximas();
    }).subscribe();
  </script>
</body>
</html>
