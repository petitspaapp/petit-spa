<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Dashboard · Petit Spa</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { display: flex; }

    .resumen-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .resumen-card {
      background: var(--blanco);
      border: 1px solid var(--detalle);
      border-radius: var(--radio-lg);
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .resumen-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--dorado), var(--dorado-claro));
      opacity: 0.6;
    }
    .resumen-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dorado); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .resumen-label svg { width: 13px; height: 13px; }
    .resumen-numero {
      font-family: var(--serif);
      font-size: 44px; font-weight: 300; line-height: 1;
      margin-bottom: 4px;
    }
    .resumen-sub { font-size: 11px; color: var(--texto-suave); }

    .citas-wrap { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }

    .citas-lista { display: flex; flex-direction: column; gap: 8px; }
    .cita-card {
      background: var(--blanco);
      border: 1px solid var(--detalle);
      border-radius: var(--radio-lg);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 14px;
      align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .cita-card:hover { box-shadow: var(--sombra); border-color: var(--acento); }
    .cita-hora-box {
      background: var(--fondo);
      border: 1px solid var(--detalle);
      border-radius: var(--radio);
      padding: 8px 4px;
      text-align: center;
    }
    .cita-hora { font-family: var(--serif); font-size: 20px; font-weight: 300; line-height: 1; }
    .cita-hora-sub { font-size: 9px; color: var(--texto-suave); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
    .cita-info h3 { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .cita-info-sub { font-size: 11px; color: var(--texto-suave); margin-bottom: 5px; }
    .cita-acciones { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
    .btn-conf {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(39,174,96,0.1); color: var(--exito);
      border: 1px solid rgba(39,174,96,0.2);
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      padding: 5px 10px; border-radius: 999px; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .btn-conf:hover { background: rgba(39,174,96,0.18); }
    .btn-conf svg { width: 11px; height: 11px; }
    .btn-canc {
      display: inline-flex; align-items: center; gap: 4px;
      background: transparent; color: var(--error);
      border: 1px solid rgba(192,57,43,0.2);
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      padding: 5px 10px; border-radius: 999px; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .btn-canc:hover { background: rgba(192,57,43,0.06); }
    .btn-canc svg { width: 11px; height: 11px; }

    .proximas-panel {
      background: var(--blanco);
      border: 1px solid var(--detalle);
      border-radius: var(--radio-lg);
      overflow: hidden;
      align-self: start;
    }
    .proximas-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--detalle);
    }
    .proximas-titulo { font-family: var(--serif); font-size: 18px; font-weight: 300; }
    .proximas-titulo em { font-style: italic; color: var(--dorado); }
    .proxima-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; transition: background 0.15s;
      border-bottom: 1px solid var(--detalle);
    }
    .proxima-item:last-child { border-bottom: none; }
    .proxima-item:hover { background: var(--fondo); }
    .proxima-dia {
      font-family: var(--serif); font-size: 22px; font-weight: 300;
      color: var(--dorado); min-width: 30px; text-align: center;
    }
    .proxima-info { flex: 1; min-width: 0; }
    .proxima-nombre { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proxima-detalle { font-size: 11px; color: var(--texto-suave); }

    @media (max-width: 680px) {
      body { display: block; }
      .resumen-grid { grid-template-columns: 1fr 1fr; }
      .citas-wrap { grid-template-columns: 1fr; }
      .proximas-panel { display: none; }
      .cita-card { grid-template-columns: 50px 1fr; }
      .cita-acciones { flex-direction: row; margin-top: 8px; grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

  <!-- Sidebar íconos -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="https://raw.githubusercontent.com/petitspaapp/petit-spa/main/petitspa-logo.png" alt="Petit Spa" />
    </div>
    <ul class="sidebar-nav">
      <li>
        <a href="dashboard.html" class="activo" data-tooltip="Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </a>
      </li>
      <li>
        <a href="calendario.html" data-tooltip="Calendario">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </a>
      </li>
      <li>
        <a href="servicios.html" data-tooltip="Servicios">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Bottom nav mobile -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="activo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Inicio
    </a>
    <a href="calendario.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Citas
    </a>
    <a href="servicios.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Servicios
    </a>
  </nav>

  <div class="main-wrap">
    <div class="main">

      <div class="page-header">
        <h1 class="page-titulo" id="fecha-titulo">Citas de <em>hoy</em></h1>
      </div>

      <!-- Resumen -->
      <div class="resumen-grid">
        <div class="resumen-card">
          <div class="resumen-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            Total hoy
          </div>
          <div class="resumen-numero" id="total-hoy">—</div>
          <div class="resumen-sub">citas programadas</div>
        </div>
        <div class="resumen-card">
          <div class="resumen-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2 2"/></svg>
            Pendientes
          </div>
          <div class="resumen-numero" id="total-pendientes">—</div>
          <div class="resumen-sub">por confirmar</div>
        </div>
        <div class="resumen-card">
          <div class="resumen-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg>
            Confirmadas
          </div>
          <div class="resumen-numero" id="total-confirmadas">—</div>
          <div class="resumen-sub">listas para atender</div>
        </div>
      </div>

      <div class="citas-wrap">
        <div class="citas-lista" id="citas-lista">
          <div class="empty-state">
            <div class="empty-state-icono">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            </div>
            <p>Sin citas hoy</p>
            <span>No hay citas programadas para hoy</span>
          </div>
        </div>
        <div class="proximas-panel">
          <div class="proximas-header">
            <div class="proximas-titulo">Próximas <em>citas</em></div>
          </div>
          <div id="proximas-lista">
            <div style="padding:30px 16px;text-align:center">
              <span style="font-size:12px;color:var(--texto-suave)">Sin próximas citas</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase, toast } from '../supabase.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) window.location.href = 'login.html';

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });

    const hoy = new Date();
    const hoyStr = hoy.toISOString().split('T')[0];
    const DIAS  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    document.getElementById('fecha-titulo').innerHTML =
      `Citas del <em>${DIAS[hoy.getDay()]} ${hoy.getDate()} de ${MESES[hoy.getMonth()]}</em>`;

    const { data: servicios } = await supabase.from('servicios').select('id, nombre');
    const mapaServ = {};
    (servicios || []).forEach(s => { mapaServ[s.id] = s.nombre; });

    async function cargarCitas() {
      const { data } = await supabase
        .from('citas').select('*')
        .eq('fecha', hoyStr)
        .order('hora', { ascending: true });

      const citas = data || [];
      document.getElementById('total-hoy').textContent        = citas.length;
      document.getElementById('total-pendientes').textContent  = citas.filter(c => c.estado === 'pendiente').length;
      document.getElementById('total-confirmadas').textContent = citas.filter(c => c.estado === 'confirmada').length;

      const lista = document.getElementById('citas-lista');
      if (citas.length === 0) {
        lista.innerHTML = `<div class="empty-state">
          <div class="empty-state-icono"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
          <p>Sin citas hoy</p><span>No hay citas programadas para hoy</span></div>`;
        return;
      }

      lista.innerHTML = citas.map(c => `
        <div class="cita-card">
          <div class="cita-hora-box">
            <div class="cita-hora">${(c.hora||'').substring(0,5)}</div>
            <div class="cita-hora-sub">hrs</div>
          </div>
          <div class="cita-info">
            <h3>${c.cliente_nombre||'—'}</h3>
            <div class="cita-info-sub">${mapaServ[c.servicio_id]||'—'} · ${c.cliente_telefono||'—'}</div>
            <span class="badge badge-${c.estado}">${c.estado}</span>
          </div>
          <div class="cita-acciones">
            ${c.estado === 'pendiente' ? `<button class="btn-conf" data-id="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Confirmar</button>` : ''}
            ${c.estado !== 'cancelada' ? `<button class="btn-canc" data-id="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>Cancelar</button>` : ''}
          </div>
        </div>`).join('');

      lista.querySelectorAll('.btn-conf').forEach(btn => {
        btn.addEventListener('click', async () => {
          await supabase.from('citas').update({ estado: 'confirmada' }).eq('id', btn.dataset.id);
          toast('Cita confirmada ✓');
          cargarCitas();
        });
      });
      lista.querySelectorAll('.btn-canc').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('¿Cancelar esta cita?')) return;
          await supabase.from('citas').update({ estado: 'cancelada' }).eq('id', btn.dataset.id);
          toast('Cita cancelada');
          cargarCitas();
        });
      });
    }

    async function cargarProximas() {
      const en7 = new Date(hoy);
      en7.setDate(en7.getDate() + 7);
      const { data } = await supabase.from('citas').select('*')
        .gt('fecha', hoyStr)
        .lte('fecha', en7.toISOString().split('T')[0])
        .in('estado', ['pendiente','confirmada'])
        .order('fecha').order('hora').limit(8);

      const contenedor = document.getElementById('proximas-lista');
      if (!data || data.length === 0) {
        contenedor.innerHTML = `<div style="padding:30px 16px;text-align:center"><span style="font-size:12px;color:var(--texto-suave)">Sin próximas citas</span></div>`;
        return;
      }
      contenedor.innerHTML = data.map(c => {
        const f = new Date(c.fecha + 'T12:00:00');
        return `<div class="proxima-item">
          <div class="proxima-dia">${f.getDate()}</div>
          <div class="proxima-info">
            <div class="proxima-nombre">${c.cliente_nombre||'—'}</div>
            <div class="proxima-detalle">${MESES[f.getMonth()].substring(0,3)} · ${(c.hora||'').substring(0,5)} · ${mapaServ[c.servicio_id]||'—'}</div>
          </div>
          <span class="badge badge-${c.estado}">${c.estado === 'confirmada' ? 'conf.' : 'pend.'}</span>
        </div>`;
      }).join('');
    }

    cargarCitas();
    cargarProximas();

    supabase.channel('dashboard')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'citas' }, () => {
        cargarCitas(); cargarProximas();
      }).subscribe();
  </script>
</body>
</html>
