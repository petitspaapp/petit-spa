<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Dashboard · Petit Spa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F2EEE9;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      color: #1A1814;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 12px;
    }
    .topbar-izq { display: flex; align-items: center; gap: 12px; }
    .logo-circle {
      width: 44px; height: 44px;
      border-radius: 50%; overflow: hidden;
      border: 2px solid #C9A84C;
      flex-shrink: 0;
    }
    .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
    .topbar-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 600;
      color: #1A1814;
    }
    .topbar-sub { font-size: 11px; color: #9A8F84; margin-top: 1px; }
    .btn-salir {
      width: 40px; height: 40px;
      background: #1A1814; border: none; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: rgba(255,255,255,0.5);
      flex-shrink: 0; transition: color 0.2s;
    }
    .btn-salir:hover { color: #C9A84C; }
    .btn-salir svg { width: 18px; height: 18px; }

    /* ── CONTENIDO ── */
    .contenido { padding: 8px 24px 100px; }

    /* Fecha */
    .fecha-bloque { margin-bottom: 24px; }
    .fecha-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 30px; font-weight: 700;
      color: #1A1814; line-height: 1.1;
    }
    .fecha-titulo em { color: #C9A84C; font-style: italic; }
    .fecha-sub { font-size: 12px; color: #9A8F84; font-weight: 500; margin-top: 4px; }

    /* ── GRID DESKTOP ── */
    .grid-principal {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    /* Card oscura grande */
    .card-hero {
      grid-column: 1 / 3;
      background: #1A1814;
      border-radius: 24px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      min-height: 160px;
    }
    .card-hero::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(201,168,76,0.6); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .hero-label svg { width: 13px; height: 13px; }
    .hero-num {
      font-family: 'Playfair Display', serif;
      font-size: 80px; font-weight: 700;
      color: #C9A84C; line-height: 1;
      margin-bottom: 4px;
    }
    .hero-desc { font-size: 13px; color: rgba(255,255,255,0.35); }

    /* Cards mini */
    .card-mini {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .mini-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: #9A8F84; margin-bottom: 12px;
      display: flex; align-items: center; gap: 5px;
    }
    .mini-label svg { width: 12px; height: 12px; }
    .mini-num {
      font-family: 'Playfair Display', serif;
      font-size: 48px; font-weight: 700; color: #1A1814; line-height: 1;
    }
    .mini-sub { font-size: 11px; color: #B0AAA3; margin-top: 4px; }

    /* ── SECCIÓN AGENDA ── */
    .seccion-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .seccion-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700; color: #1A1814;
    }
    .seccion-titulo em { color: #C9A84C; font-style: italic; }

    /* ── CITA ROW ── */
    .cita-row {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.15s;
    }
    .cita-row:hover { transform: translateX(4px); }
    .hora-pill {
      background: #FBF6EC;
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
      flex-shrink: 0;
      min-width: 58px;
    }
    .hora-num {
      font-family: 'Playfair Display', serif;
      font-size: 19px; font-weight: 700;
      color: #C9A84C; line-height: 1;
    }
    .hora-suf { font-size: 9px; font-weight: 700; color: #C9A84C; opacity: 0.6; letter-spacing: 0.08em; }
    .cita-info { flex: 1; min-width: 0; }
    .cita-nombre { font-size: 14px; font-weight: 600; color: #1A1814; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cita-serv { font-size: 12px; color: #9A8F84; }
    .cita-right { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }

    .badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 999px; letter-spacing: 0.04em; text-transform: uppercase; }
    .badge-pendiente  { background: rgba(230,81,0,0.1); color: #E65100; }
    .badge-confirmada { background: rgba(46,125,50,0.1); color: #2E7D32; }
    .badge-cancelada  { background: rgba(229,57,53,0.1); color: #E53935; }

    .btn-conf { background: rgba(46,125,50,0.1); color: #2E7D32; border: none; border-radius: 999px; font-size: 11px; font-weight: 700; padding: 6px 12px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 4px; transition: background 0.15s; font-family: 'Inter', sans-serif; }
    .btn-conf:hover { background: rgba(46,125,50,0.2); }
    .btn-conf svg { width: 11px; height: 11px; }
    .btn-canc { background: transparent; color: #E53935; border: 1px solid rgba(229,57,53,0.25); border-radius: 999px; font-size: 11px; font-weight: 700; padding: 6px 12px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 4px; transition: background 0.15s; font-family: 'Inter', sans-serif; }
    .btn-canc:hover { background: rgba(229,57,53,0.05); }
    .btn-canc svg { width: 11px; height: 11px; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 48px 24px; background: #FFFFFF; border-radius: 24px; }
    .empty-icon { width: 56px; height: 56px; background: #FBF6EC; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .empty-icon svg { width: 24px; height: 24px; color: #C9A84C; }
    .empty h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #1A1814; margin-bottom: 4px; }
    .empty p { font-size: 12px; color: #9A8F84; }



    /* ── TOAST ── */
    .toast { position: fixed; bottom: 96px; right: 28px; background: #1A1814; color: white; font-size: 13px; font-weight: 600; padding: 12px 18px; border-radius: 14px; z-index: 500; transform: translateY(20px); opacity: 0; transition: all 0.3s; border-left: 3px solid #C9A84C; }
    .toast.visible { transform: translateY(0); opacity: 1; }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      .contenido { padding: 8px 16px 100px; }
      .topbar { padding: 16px 16px 10px; }
      .grid-principal { grid-template-columns: 1fr 1fr; }
      .card-hero { grid-column: 1 / 3; }
      .hero-num { font-size: 60px; }
      .cita-row { padding: 14px 16px; }
      .cita-right { flex-direction: row; flex-wrap: wrap; justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-izq">
      <div class="logo-circle">
        <img src="https://raw.githubusercontent.com/petitspaapp/petit-spa/main/petitspa-logo.png" alt="Petit Spa" />
      </div>
      <div>
        <div class="topbar-nombre">Petit Spa</div>
        <div class="topbar-sub" id="saludo">—</div>
      </div>
    </div>
    <button class="btn-salir" id="btn-logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <!-- Contenido -->
  <div class="contenido">

    <div class="fecha-bloque">
      <div class="fecha-titulo" id="fecha-titulo">—</div>
      <div class="fecha-sub" id="fecha-sub">—</div>
    </div>

    <div class="grid-principal">
      <div class="card-hero">
        <div class="hero-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Citas hoy
        </div>
        <div class="hero-num" id="total-hoy">—</div>
        <div class="hero-desc">programadas para hoy</div>
      </div>
      <div class="card-mini">
        <div class="mini-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2 2"/></svg>
          Pendientes
        </div>
        <div>
          <div class="mini-num" id="total-pendientes">—</div>
          <div class="mini-sub">por confirmar</div>
        </div>
      </div>
      <div class="card-mini">
        <div class="mini-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmadas
        </div>
        <div>
          <div class="mini-num" id="total-conf">—</div>
          <div class="mini-sub">listas</div>
        </div>
      </div>
    </div>

    <div class="seccion-header">
      <div class="seccion-titulo">Agenda de <em>hoy</em></div>
    </div>
    <div id="citas-lista"></div>

  </div>



  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase } from '../supabase.js';
    import { initFAB } from '../fab.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) window.location.href = 'login.html';

    initFAB('dashboard');

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });


    const hoy = new Date();
    const hoyStr = hoy.toISOString().split('T')[0];
    const hora = hoy.getHours();
    const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    document.getElementById('saludo').textContent = hora < 12 ? 'Buenos días' : hora < 18 ? 'Buenas tardes' : 'Buenas noches';
    document.getElementById('fecha-titulo').innerHTML = `${DIAS[hoy.getDay()]}, <em>${hoy.getDate()}</em>`;
    document.getElementById('fecha-sub').textContent = `${MESES[hoy.getMonth()]} ${hoy.getFullYear()}`;

    const { data: servicios } = await supabase.from('servicios').select('id, nombre');
    const mapaServ = {};
    (servicios || []).forEach(s => mapaServ[s.id] = s.nombre);

    function mostrarToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('visible');
      setTimeout(() => t.classList.remove('visible'), 2500);
    }

    async function cargarCitas() {
      const { data } = await supabase.from('citas').select('*').eq('fecha', hoyStr).order('hora', { ascending: true });
      const citas = data || [];
      document.getElementById('total-hoy').textContent        = citas.length;
      document.getElementById('total-pendientes').textContent  = citas.filter(c => c.estado === 'pendiente').length;
      document.getElementById('total-conf').textContent        = citas.filter(c => c.estado === 'confirmada').length;

      const lista = document.getElementById('citas-lista');
      if (!citas.length) {
        lista.innerHTML = `<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div><h3>Sin citas hoy</h3><p>No hay citas programadas para hoy</p></div>`;
        return;
      }
      lista.innerHTML = citas.map(c => `
        <div class="cita-row">
          <div class="hora-pill">
            <div class="hora-num">${(c.hora||'').substring(0,5)}</div>
            <div class="hora-suf">HRS</div>
          </div>
          <div class="cita-info">
            <div class="cita-nombre">${c.cliente_nombre||'—'}</div>
            <div class="cita-serv">${mapaServ[c.servicio_id]||'—'} · ${c.cliente_telefono||'—'}</div>
          </div>
          <div class="cita-right">
            <span class="badge badge-${c.estado}">${c.estado}</span>
            ${c.estado === 'pendiente' ? `<button class="btn-conf" data-id="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Confirmar</button>` : ''}
            ${c.estado !== 'cancelada' ? `<button class="btn-canc" data-id="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>Cancelar</button>` : ''}
          </div>
        </div>`).join('');

      lista.querySelectorAll('.btn-conf').forEach(btn => {
        btn.addEventListener('click', async () => {
          await supabase.from('citas').update({ estado: 'confirmada' }).eq('id', btn.dataset.id);
          mostrarToast('Cita confirmada ✓'); cargarCitas();
        });
      });
      lista.querySelectorAll('.btn-canc').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('¿Cancelar esta cita?')) return;
          await supabase.from('citas').update({ estado: 'cancelada' }).eq('id', btn.dataset.id);
          mostrarToast('Cita cancelada'); cargarCitas();
        });
      });
    }

    cargarCitas();
    supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'citas' }, () => cargarCitas()).subscribe();
  </script>
</body>
</html>
