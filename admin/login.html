<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4A4035" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Petit Spa · Admin</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body {
      background: var(--texto);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    .login-card {
      position: relative;
      z-index: 1;
      background: var(--fondo);
      border: 1px solid var(--detalle);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.3);
    }
    .login-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      gap: 10px;
    }
    .login-logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(201,168,76,0.3);
      box-shadow: 0 0 0 6px rgba(201,168,76,0.06);
    }
    .login-logo img { width: 100%; height: 100%; object-fit: cover; }
    .login-sub {
      font-size: 10px;
      color: var(--dorado);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .divisor-dorado {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--dorado), transparent);
      opacity: 0.25;
      margin-bottom: 28px;
    }
    .campo { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .campo label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--dorado);
    }
    .campo input {
      background: var(--blanco);
      border: 1.5px solid var(--detalle);
      border-radius: var(--radio);
      padding: 12px 16px;
      font-family: var(--sans);
      font-size: 14px; font-weight: 300;
      color: var(--texto); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .campo input:focus {
      border-color: var(--dorado);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }
    .error-msg {
      display: none; font-size: 12px; color: var(--error);
      text-align: center; margin-bottom: 14px;
      padding: 10px 14px; background: rgba(192,57,43,0.06);
      border-radius: var(--radio); border: 1px solid rgba(192,57,43,0.2);
    }
    .error-msg.visible { display: block; }
    .btn-login {
      width: 100%; background: var(--dorado); color: var(--blanco);
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      letter-spacing: 0.08em; padding: 14px; border: none;
      border-radius: 999px; cursor: pointer; margin-top: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-login:hover:not(:disabled) {
      background: var(--dorado-osc);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(201,168,76,0.35);
    }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: girar 0.7s linear infinite; margin: 0 auto;
    }
    .btn-login.cargando .texto { display: none; }
    .btn-login.cargando .spinner { display: block; }
    @keyframes girar { to { transform: rotate(360deg); } }
    .login-footer {
      text-align: center; margin-top: 24px;
      font-size: 11px; color: var(--dorado);
      opacity: 0.4; letter-spacing: 0.06em;
    }
    @media (max-width: 480px) {
      .login-card { padding: 32px 20px 28px; }
      .campo input { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo-wrap">
      <div class="login-logo">
        <img src="https://raw.githubusercontent.com/petitspaapp/petit-spa/main/petitspa-logo.png" alt="Petit Spa" />
      </div>
      <span class="login-sub">Panel de administración</span>
    </div>
    <div class="divisor-dorado"></div>
    <div class="campo">
      <label for="email">Correo</label>
      <input type="email" id="email" placeholder="correo@petitspa.com" autocomplete="email" />
    </div>
    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button class="btn-login" id="btn-login">
      <span class="texto">Entrar</span>
      <span class="spinner"></span>
    </button>
    <p class="login-footer">Petit Spa · Solo acceso autorizado</p>
  </div>

  <script type="module">
    import { supabase } from '../supabase.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'dashboard.html';

    const btnLogin = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');

    function mostrarError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    btnLogin.addEventListener('click', async () => {
      errorMsg.classList.remove('visible');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { mostrarError('Ingresa tu correo y contraseña.'); return; }
      btnLogin.classList.add('cargando');
      btnLogin.disabled = true;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        const msgs = {
          'Invalid login credentials': 'Correo o contraseña incorrectos.',
          'Too many requests':         'Demasiados intentos. Espera un momento.',
        };
        mostrarError(msgs[error.message] || 'Error al iniciar sesión.');
        btnLogin.classList.remove('cargando');
        btnLogin.disabled = false;
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') btnLogin.click(); });
  </script>
</body>
</html>
